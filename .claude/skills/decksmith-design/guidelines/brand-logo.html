<!-- @dsCard group="Brand" viewport="700x200" name="Logo & lockup" subtitle="Amber ◈ diamond mark + Outfit wordmark — mark, lockup, reversed" -->
<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
      }
      .pane {
        padding: 30px 26px;
        display: flex;
        align-items: center;
        gap: 48px;
      }
      .lock {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .mark {
        color: var(--brand);
      }
      .word {
        font: 700 26px var(--font-display);
        letter-spacing: -0.015em;
      }
      .stack {
        text-align: center;
      }
      .cap {
        font: 500 11px var(--font-mono);
        color: var(--text-muted);
        margin-top: 14px;
      }
      svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="pane">
      <div class="stack">
        <div class="mark">
          <svg width="56" height="56" viewBox="0 0 32 32" fill="none">
            <path d="M16 1.5 30.5 16 16 30.5 1.5 16 16 1.5Z" fill="currentColor" opacity=".16" />
            <path
              d="M16 1.5 30.5 16 16 30.5 1.5 16Z"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linejoin="round"
            />
            <path d="M16 8.5 23.5 16 16 23.5 8.5 16Z" fill="currentColor" />
            <path d="M16 13 19 16 16 19 13 16Z" fill="#0f0e17" />
          </svg>
        </div>
        <div class="cap">mark</div>
      </div>
      <div class="stack">
        <div class="lock">
          <span class="mark"
            ><svg width="34" height="34" viewBox="0 0 32 32" fill="none">
              <path
                d="M16 1.5 30.5 16 16 30.5 1.5 16Z"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linejoin="round"
              />
              <path d="M16 8.5 23.5 16 16 23.5 8.5 16Z" fill="currentColor" /></svg></span
          ><span class="word">Decksmith</span>
        </div>
        <div class="cap">horizontal lockup</div>
      </div>
    </div>
  </body>
</html>
