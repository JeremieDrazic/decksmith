<!-- @dsCard group="Type" viewport="700x340" name="Type scale" subtitle="Outfit display — xs 12 → 4xl 36, paired line-heights" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); }
  .pane { padding: 22px 26px; }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: none; }
  .tok { width: 110px; flex: none; font: 500 11px var(--font-mono); color: var(--text-muted); }
  .spec { font-family: var(--font-display); color: var(--text); line-height: 1.1; }
</style>
</head>
<body>
<div class="pane">
  <div class="line"><span class="tok">4xl · 36/1.1</span><span class="spec" style="font-size:var(--text-4xl);font-weight:700">Build with intent</span></div>
  <div class="line"><span class="tok">3xl · 30/1.2</span><span class="spec" style="font-size:var(--text-3xl);font-weight:700">Page titles</span></div>
  <div class="line"><span class="tok">2xl · 24/1.3</span><span class="spec" style="font-size:var(--text-2xl);font-weight:600">Section headings</span></div>
  <div class="line"><span class="tok">xl · 20/1.4</span><span class="spec" style="font-size:var(--text-xl);font-weight:600">Sub-headings</span></div>
  <div class="line"><span class="tok">lg · 18/1.5</span><span class="spec" style="font-size:var(--text-lg);font-weight:500">Lead text for intros</span></div>
  <div class="line"><span class="tok">base · 16/1.6</span><span class="spec" style="font-size:var(--text-base)">Primary body copy</span></div>
  <div class="line"><span class="tok">sm · 14/1.5</span><span class="spec" style="font-size:var(--text-sm);color:var(--text-muted)">Secondary body, captions</span></div>
  <div class="line"><span class="tok">xs · 12/1.5</span><span class="spec" style="font-size:var(--text-xs);color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase">Badges · metadata · labels</span></div>
</div>
</body>
</html>
